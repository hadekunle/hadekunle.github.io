<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Clock</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
      color: #58a6ff;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #8b949e;
      margin-bottom: 2.5rem;
    }

    .layout {
      display: flex;
      flex-direction: row;
      gap: 2rem;
      width: 100%;
      max-width: 1100px;
      align-items: flex-start;
    }

    /* Analog panel */
    .analog-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 14px;
      padding: 1.75rem 1.5rem;
      min-width: 200px;
    }

    .analog-label {
      font-size: 0.75rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }

    .analog-digital {
      margin-top: 1rem;
      font-size: 1.4rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #58a6ff;
      letter-spacing: 0.02em;
    }

    .analog-date {
      font-size: 0.78rem;
      color: #8b949e;
      margin-top: 0.3rem;
      text-align: center;
    }

    .analog-tz {
      font-size: 0.72rem;
      color: #484f58;
      margin-top: 0.4rem;
    }

    /* Fixed 2-column grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      flex: 1;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 14px;
      padding: 1.1rem 1.3rem;
      transition: transform 0.2s, border-color 0.2s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent, #58a6ff);
      border-radius: 14px 14px 0 0;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: var(--accent, #58a6ff);
    }

    .flag    { font-size: 1.6rem; line-height: 1; margin-bottom: 0.35rem; }
    .city    { font-size: 1rem; font-weight: 600; color: #e6edf3; }
    .country { font-size: 0.75rem; color: #8b949e; margin-bottom: 0.6rem; }

    .time {
      font-size: 1.75rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      color: var(--accent, #58a6ff);
      line-height: 1.1;
    }

    .date { font-size: 0.75rem; color: #8b949e; margin-top: 0.2rem; }

    footer {
      margin-top: 3rem;
      font-size: 0.78rem;
      color: #484f58;
    }

    @media (max-width: 700px) {
      .layout { flex-direction: column; align-items: center; }
      .analog-panel { width: 100%; max-width: 320px; }
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <h1>&#127758; World Clock</h1>
  <p class="subtitle">Live times updated every second</p>

  <div class="layout">

    <div class="analog-panel">
      <div class="analog-label">Your Local Time</div>
      <canvas id="analogClock" width="160" height="160"></canvas>
      <div class="analog-digital" id="localDigital">--:--:--</div>
      <div class="analog-date" id="localDate">---</div>
      <div class="analog-tz" id="localTZ"></div>
    </div>

    <div class="grid" id="grid"></div>

  </div>

  <footer>Times shown in each city's local timezone &bull; Updates automatically</footer>

  <script>
    var cities = [
      { city: 'New York',  country: 'United States',  tz: 'America/New_York',    flag: '\uD83C\uDDFA\uD83C\uDDF8', accent: '#58a6ff' },
      { city: 'London',    country: 'United Kingdom',  tz: 'Europe/London',       flag: '\uD83C\uDDEC\uD83C\uDDE7', accent: '#bc8cff' },
      { city: 'Lagos',     country: 'Nigeria',         tz: 'Africa/Lagos',        flag: '\uD83C\uDDF3\uD83C\uDDEC', accent: '#3fb950' },
      { city: 'Riyadh',    country: 'Saudi Arabia',    tz: 'Asia/Riyadh',         flag: '\uD83C\uDDF8\uD83C\uDDE6', accent: '#ffa657' },
      { city: 'Taipei',    country: 'Taiwan',          tz: 'Asia/Taipei',         flag: '\uD83C\uDDF9\uD83C\uDDFC', accent: '#79c0ff' },
      { city: 'Tokyo',     country: 'Japan',           tz: 'Asia/Tokyo',          flag: '\uD83C\uDDEF\uD83C\uDDF5', accent: '#ff7b72' },
      { city: 'Casablanca',country: 'Morocco',         tz: 'Africa/Casablanca',   flag: '\uD83C\uDDF2\uD83C\uDDE6', accent: '#f0d060' },
      { city: 'Sydney',    country: 'Australia',       tz: 'Australia/Sydney',    flag: '\uD83C\uDDE6\uD83C\uDDFA', accent: '#ff69b4' }
    ];

    var grid = document.getElementById('grid');
    var timeFormatters = {};
    var dateFormatters = {};

    cities.forEach(function(c) {
      var safeId = c.tz.replace(/\//g, '-');

      timeFormatters[c.tz] = new Intl.DateTimeFormat('en-US', {
        timeZone: c.tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
      });
      dateFormatters[c.tz] = new Intl.DateTimeFormat('en-US', {
        timeZone: c.tz, weekday: 'short', year: 'numeric', month: 'short', day: 'numeric'
      });

      var card = document.createElement('div');
      card.className = 'card';
      card.style.setProperty('--accent', c.accent);
      card.innerHTML =
        '<div class="flag">' + c.flag + '</div>' +
        '<div class="city">' + c.city + '</div>' +
        '<div class="country">' + c.country + '</div>' +
        '<div class="time" id="time-' + safeId + '">--:--:--</div>' +
        '<div class="date" id="date-' + safeId + '">---</div>';
      grid.appendChild(card);
    });

    /* Analog clock */
    var canvas = document.getElementById('analogClock');
    var ctx    = canvas.getContext('2d');
    var cx     = canvas.width / 2;
    var cy     = canvas.height / 2;
    var radius = cx - 8;

    function drawHand(angle, length, width, color) {
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(angle) * length, cy + Math.sin(angle) * length);
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    function drawClock(now) {
      var h = now.getHours() % 12;
      var m = now.getMinutes();
      var s = now.getSeconds();

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
      ctx.fillStyle = '#0d1117';
      ctx.fill();
      ctx.strokeStyle = '#30363d';
      ctx.lineWidth = 2;
      ctx.stroke();

      for (var i = 0; i < 12; i++) {
        var angle = (i / 12) * 2 * Math.PI - Math.PI / 2;
        var isQ = (i % 3 === 0);
        var inner = radius - (isQ ? 14 : 8);
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(angle) * inner, cy + Math.sin(angle) * inner);
        ctx.lineTo(cx + Math.cos(angle) * (radius - 3), cy + Math.sin(angle) * (radius - 3));
        ctx.strokeStyle = isQ ? '#58a6ff' : '#484f58';
        ctx.lineWidth   = isQ ? 2.5 : 1.5;
        ctx.stroke();
      }

      drawHand(((h + m / 60) / 12) * 2 * Math.PI - Math.PI / 2, radius * 0.55, 5,   '#e6edf3');
      drawHand(((m + s / 60) / 60) * 2 * Math.PI - Math.PI / 2, radius * 0.78, 3.5, '#e6edf3');
      drawHand((s / 60)            * 2 * Math.PI - Math.PI / 2, radius * 0.88, 1.5, '#58a6ff');

      ctx.beginPath();
      ctx.arc(cx, cy, 4, 0, 2 * Math.PI);
      ctx.fillStyle = '#58a6ff';
      ctx.fill();
    }

    var localTimeFmt = new Intl.DateTimeFormat('en-US', {
      hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
    });
    var localDateFmt = new Intl.DateTimeFormat('en-US', {
      weekday: 'short', year: 'numeric', month: 'short', day: 'numeric'
    });

    document.getElementById('localTZ').textContent =
      Intl.DateTimeFormat().resolvedOptions().timeZone;

    function updateAll() {
      var now = new Date();
      drawClock(now);
      document.getElementById('localDigital').textContent = localTimeFmt.format(now);
      document.getElementById('localDate').textContent    = localDateFmt.format(now);

      cities.forEach(function(c) {
        var safeId = c.tz.replace(/\//g, '-');
        var timeEl = document.getElementById('time-' + safeId);
        var dateEl = document.getElementById('date-' + safeId);
        if (timeEl) timeEl.textContent = timeFormatters[c.tz].format(now);
        if (dateEl) dateEl.textContent = dateFormatters[c.tz].format(now);
      });
    }

    updateAll();
    setInterval(updateAll, 1000);
  </script>
</body>
</html>
